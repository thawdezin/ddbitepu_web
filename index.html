<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DD BitePu - Moving to Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: var(--primary-color);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .app-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-android {
            background-color: #3DDC84;
            color: #000;
        }

        .btn-ios {
            background-color: #000;
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Simple Fade-in Animation */
        .container {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <svg viewBox="0 0 24 24"><path d="M18,11H6V6h12V11z M16.5,17c0.83,0,1.5-0.67,1.5-1.5S17.33,14,16.5,14S15,14.67,15,15.5S15.67,17,16.5,17z M7.5,17 c0.83,0,1.5-0.67,1.5-1.5S8.33,14,7.5,14S6,14.67,6,15.5S6.67,17,7.5,17z M4,16c0,0.88,0.39,1.67,1,2.22V20c0,0.55,0.45,1,1,1h1 c0.55,0,1-0.45,1-1v-1h8v1c0,0.55,0.45,1,1,1h1c0.55,0,1-0.45,1-1v-1.78c0.61-0.55,1-1.34,1-2.22V6c0-3.5-3.58-4-8-4s-8,0.5-8,4V16z"/></svg>
        </div>

        <h1>We’ve Moved!</h1>
        <p>ပိုမိုကောင်းမွန်တဲ့ Experience အတွက် Website ကို အနားပေးလိုက်ပါပြီ။ Mobile Appsတွေကို အောက်က Link တွေကနေ Download ရယူနိုင်ပါတယ်ရှင့်။</p>

        <div class="app-links">
            <a href="https://play.google.com/store/apps/details?id=com.thawdezin.bus_nexus_rader&hl=en&pli=1" class="btn btn-android" target="_blank">
                <span>Download for Android</span>
            </a>
            <a href="https://apps.apple.com/us/app/ybs-app-dd-bitepu/id6755322013" class="btn btn-ios" target="_blank">
                <span>Download for iOS</span>
            </a>
        </div>

        <div class="footer-note">
            Thank you for staying with us.
        </div>
    </div>

</body>
</html>
